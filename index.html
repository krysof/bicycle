<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>今天也要送到 - 3D 陪伴送报原型</title>
    <link rel="stylesheet" href="./styles.css?v=20260601.15" />
  </head>
  <body>
    <canvas id="gameCanvas" aria-label="3D 社区送报游戏画面"></canvas>

    <main id="ui" class="ui" aria-live="polite"></main>

    <div id="versionBadge" class="version-badge" aria-label="Build version">v20260601.15</div>

    <div id="languagePanel" class="language-panel" aria-label="Language">
      <label for="languageSelect">🌐</label>
      <select id="languageSelect" aria-label="Language selector"></select>
      <button id="musicToggle" class="audio-toggle" type="button" aria-label="Music">🎵</button>
      <button id="sfxToggle" class="audio-toggle" type="button" aria-label="Sound effects">🔔</button>
    </div>
    <div id="comicBubble" class="comic-bubble hidden" aria-live="polite"></div>

    <div id="touchControls" class="touch-controls hidden" aria-label="Touch controls">
      <div id="touchJoystick" class="touch-joystick" aria-label="Steering">
        <div class="touch-joystick-ring">
          <div id="touchStick" class="touch-stick"></div>
        </div>
        <span id="touchSteerLabel" class="touch-joystick-label">左右</span>
      </div>
      <div class="touch-action-stack">
        <div class="touch-drive-row">
          <button id="touchBackBtn" class="touch-back" type="button">后退</button>
          <button id="touchForwardBtn" class="touch-forward" type="button">前进</button>
        </div>
        <button id="touchDeliverBtn" class="touch-deliver" type="button">投递</button>
      </div>
    </div>

    <section id="hud" class="hud hidden" aria-label="游戏操作面板">
      <div class="hud-card">
        <p id="hudEyebrow" class="eyebrow">今日任务</p>
        <h2 id="targetName">准备出发</h2>
        <p id="targetHint">↑/W 前进，↓/S 后退，←→ 转向。</p>
        <p id="companionLine">阿铃：不着急，我们慢慢来。</p>
        <div class="hud-actions">
          <button id="deliverBtn" class="primary">投递报纸</button>
          <button id="pauseBtn">暂停</button>
          <button id="endBtn">提前总结</button>
        </div>
        <div class="assist-actions" aria-label="辅助功能">
          <button id="easyModeBtn" type="button">安心</button>
          <button id="locateBtn" type="button">找目标</button>
          <button id="autoForwardBtn" type="button">自动</button>
          <button id="contrastBtn" type="button">高对比</button>
        </div>
      </div>
    </section>

    <script type="module" src="./src/main.js?v=20260601.15"></script>
  </body>
</html>
